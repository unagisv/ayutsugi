<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>歩継ぎ ドット絵プロトタイプ v2（24×32）</title>
<style>
  body { background:#3a3a3a; color:#eee; font-family:monospace; padding:16px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; margin-bottom:18px; }
  .cell { text-align:center; }
  .cell span { display:block; font-size:11px; margin-top:4px; color:#bbb; }
  canvas { image-rendering: pixelated; background:#555; }
  h2 { font-size:14px; border-bottom:1px solid #666; padding-bottom:4px; }
</style>
</head>
<body>
<h1 style="font-size:16px">キャラ試作 v2 ― 24×32ドット 2頭身（パーツ合成）</h1>
<div id="out"></div>
<script>
// ── ドット絵エンジン：半分定義（12文字）→左右ミラー＋座標パッチ ──────
// 凡例: .=透明 K=輪郭 H=髪 S=肌 s=肌影 E=目 C=服 c=服影 B=帯 W=襟/白 F=袴/靴 G=金 R=赤飾り
function mirror(half) { return half + half.split('').reverse().join(''); }

const PAL = {
  K:'#33241a', S:'#f2cfa4', s:'#dba87e', E:'#2a1c12',
  W:'#f5efdf', F:'#4c3c2c', G:'#d9b13f', R:'#d8504a',
};
const HAIR_COLORS = { black:'#413a34', brown:'#7a512f', chestnut:'#a06b38', gray:'#b8b0a2', white:'#eae6dc' };
const TIERS = {
  '質素': { C:'#9c8a66', c:'#7a6b4e', B:'#6b5d44' },
  '標準': { C:'#48688c', c:'#37516e', B:'#8c3b34' },
  '立派': { C:'#8c3b34', c:'#6e2c27', B:'#d9b13f' },
};

// ── 髪型（r0-r7 の半行8つ＋サイド深さ＋ミラー後パッチ）──────────────
const HAIRS = {
  short: { side: 10, top: [
    '....KKKKKKKK', '...KHHHHHHHH', '..KHHHHHHHHH', '.KHHHHHHHHHH',
    '.KHHHHHHHHHH', 'KHHHHHHHHHHH', 'KHHHSSSSSSSS', 'KHHSSSSSSSSS'] },
  spiky: { side: 9, top: [
    '....KK.KK.KK', '...KHHKHHKHH', '..KHHHHHHHHH', '.KHHHHHHHHHH',
    '.KHHHHHHHHHH', 'KHHHHHHHHHHH', 'KHHSHSHSHSHS', 'KHHSSSSSSSSS'] },
  bob: { side: 13, wide: true, top: [
    '....KKKKKKKK', '...KHHHHHHHH', '..KHHHHHHHHH', '.KHHHHHHHHHH',
    '.KHHHHHHHHHH', 'KHHHHHHHHHHH', 'KHHHHHHHHHHH', 'KHHHSSSSSSSS'] },
  long: { side: 15, top: [
    '....KKKKKKKK', '...KHHHHHHHH', '..KHHHHHHHHH', '.KHHHHHHHHHH',
    '.KHHHHHHHHHH', 'KHHHHHHHHHHH', 'KHHHSSSSSSSS', 'KHHSSSSSSSSS'],
    post: [[16,2,'H'],[16,3,'H'],[17,2,'H'],[17,3,'H'],[18,2,'H'],[18,3,'H'],[19,2,'H'],[19,3,'H'],
           [20,3,'H'],[21,3,'H'],[16,20,'H'],[16,21,'H'],[17,20,'H'],[17,21,'H'],[18,20,'H'],[18,21,'H'],
           [19,20,'H'],[19,21,'H'],[20,20,'H'],[21,20,'H']] },
  ponytail: { side: 10, top: [
    '....KKKKKKKK', '...KHHHHHHHH', '..KHHHHHHHHH', '.KHHHHHHHHHH',
    '.KHHHHHHHHHH', 'KHHHHHHHHHHH', 'KHHHSSSSSSSS', 'KHHSSSSSSSSS'],
    post: [[2,20,'H'],[2,21,'H'],[3,21,'H'],[3,22,'H'],[4,21,'H'],[4,22,'H'],[5,22,'H'],[5,23,'H'],
           [6,22,'H'],[6,23,'H'],[7,22,'H'],[7,23,'H'],[8,22,'H'],[8,23,'H'],[9,22,'H'],[9,23,'H'],
           [10,22,'H'],[10,23,'H'],[11,21,'H'],[11,22,'H'],[12,21,'H'],[12,22,'H'],[13,21,'H'],[14,21,'H'],[15,21,'H']] },
  twintail: { side: 11, top: [
    '....KKKKKKKK', '...KHHHHHHHH', '..KHHHHHHHHH', '.KHHHHHHHHHH',
    '.KHHHHHHHHHH', 'KHHHHHHHHHHH', 'KHHHSSSSSSSS', 'KHHSSSSSSSSS'],
    post: [[8,0,'H'],[9,0,'H'],[10,0,'H'],[11,0,'H'],[12,0,'H'],[13,0,'H'],[14,0,'H'],[15,0,'H'],
           [15,1,'H'],[16,0,'H'],[16,1,'H'],[17,1,'H'],[17,2,'H'],[18,2,'H'],
           [8,23,'H'],[9,23,'H'],[10,23,'H'],[11,23,'H'],[12,23,'H'],[13,23,'H'],[14,23,'H'],[15,23,'H'],
           [15,22,'H'],[16,23,'H'],[16,22,'H'],[17,22,'H'],[17,21,'H'],[18,21,'H']] },
  bun: { side: 10, top: [
    '.HHH.KKKKKKK', '.HHHKHHHHHHH', '.HHHKHHHHHHH', '.KHHHHHHHHHH',
    '.KHHHHHHHHHH', 'KHHHHHHHHHHH', 'KHHHSSSSSSSS', 'KHHSSSSSSSSS'] },
  mage: { side: 9, top: [
    '..........HH', '.....KKKKKHH', '...KKSSSSSSS', '.KHSSSSSSSSS',
    '.KHSSSSSSSSS', 'KHHSSSSSSSSS', 'KHHHSSSSSSSS', 'KHHSSSSSSSSS'] },
  bald: { side: -1, top: [
    '............', '....KKKKKKKK', '...KSSSSSSSS', '..KSSSSSSSSS',
    '.KSSSSSSSSSS', 'KSSSSSSSSSSS', 'KSSSSSSSSSSS', 'KSSSSSSSSSSS'] },
};

// ── 顔（r8-r15）：表情＝目と口もと ──────────────────────────────
function faceRows(eyes) {
  const e1 = eyes === 'sad' ? 'S' : 'E';
  const e2 = eyes === 'happy' ? 'S' : 'E';
  return [
    'KHSSSSSSSSSS',                        // r8
    'KHSSSS' + e1 + e1 + 'SSSS',           // r9 目（上）cols6-7
    'KHSSSS' + e2 + e2 + 'SSSS',           // r10 目（下）
    '.KSSSSSSSSSS',                        // r11
    '.KSSSSSSSSSS',                        // r12（頬・blushパッチ位置）
    '..KSSSSSSSSS',                        // r13（口もとパッチ位置）
    '...KSSSSSSSS',                        // r14
    '....KKKKKKKK',                        // r15 あご
  ];
}
const FACE_PATCH = {
  normal: [[13,11,'s'],[13,12,'s']],
  happy:  [[13,10,'K'],[13,13,'K'],[12,4,'s'],[12,19,'s']],
  sad:    [[13,11,'K'],[13,12,'K']],
};

// ── 服装（r16-r31 の半行16）─────────────────────────────────
const OUTFIT_FORMS = {
  kimono: [
    '....KCCCCCWW', '...KCCCCCCWW', '...KCCCCCCCW', '...KCCCCCCCC',
    '...KCCCCCCCC', '...KCCCCCCCC', '...KSCCCCCCC', '...KBBBBBBBB',
    '...KBBBBBBBB', '...KCCCCCCCC', '...KCCCCCCCC', '...KcCCCCCCC',
    '...KcCCCCCCC', '....KKKKKKKK', '.....KFF....', '.....KKK....'],
  shima: [
    '....KCCCCCWW', '...KCCCCCCWW', '...KCcCCcCCW', '...KCcCCcCCc',
    '...KCcCCcCCc', '...KCcCCcCCc', '...KScCCcCCc', '...KBBBBBBBB',
    '...KBBBBBBBB', '...KCcCCcCCc', '...KCcCCcCCc', '...KCcCCcCCc',
    '...KCcCCcCCc', '....KKKKKKKK', '.....KFF....', '.....KKK....'],
  haori: [
    '....KcCCCCWW', '...KcCCCCCWW', '...KcCCCCCWW', '...KcCCCCCWW',
    '...KcCCCCCWW', '...KcCCCCCWW', '...KScCCCCWW', '...KcCCCCBBB',
    '...KcCCCCBBB', '...KcCCCCCCC', '...KcCCCCCCC', '...KcCCCCCCC',
    '...KcCCCCCCC', '....KKKKKKKK', '.....KFF....', '.....KKK....'],
  montsuki: [
    '....KcCCCCWW', '...KcCGCCCWW', '...KcCCCCCWW', '...KcCCCCCWW',
    '...KcCCCCCWW', '...KcCCCCCWW', '...KScCCCCWW', '...KcCCCGBBB',
    '...KcCCCGBBB', '...KcCCCCCCC', '...KcCCCCCCC', '...KcCCCCCCC',
    '...KcCCCCCCC', '....KKKKKKKK', '.....KFF....', '.....KKK....'],
  samue: [
    '....KCCCCCWW', '...KCCCCCCCW', '...KCCCCCCCC', '...KCCCCCCCC',
    '...KCCCCCCCC', '...KCCCCCCCC', '...KSCCCCCCC', '...KBBBBBBBB',
    '...KCCCCCCCC', '....KFFFFFFF', '....KFFFFFFF', '.....KFF....',
    '.....KFF....', '.....KFF....', '.....KFF....', '.....KKK....'],
  shirt: [
    '....KCCCCCWW', '...KCCCCCCCW', '...KCCCCCCCC', '...KCCCCCCCC',
    '...KCCCCCCCC', '...KCCCCCCCC', '...KSCCCCCCC', '...KCCCCCCCC',
    '....KBBBBBBB', '....KFFFFFFF', '....KFFFFFFF', '.....KFF....',
    '.....KFF....', '.....KFF....', '.....KFF....', '.....KKK....'],
};

// 子ども（頭はそのまま・胴8行＝24×24）
const CHILD_BODY = [
  '....KCCCCCWW', '...KCCCCCCCC', '...KSCCCCCCC', '...KBBBBBBBB',
  '...KCCCCCCCC', '....KKKKKKKK', '.....KFF....', '.....KKK....'];

// ── アクセサリ（ミラー後の絶対座標パッチ）──────────────────────
const ACCESSORIES = {
  kanzashi: [[1,16,'G'],[0,17,'G'],[1,18,'G'],[2,19,'G'],[1,17,'G']],
  ribbon: [[0,16,'R'],[0,19,'R'],[1,16,'R'],[1,17,'R'],[1,18,'R'],[1,19,'R'],[2,17,'R'],[2,18,'R']],
  hachimaki: Array.from({length:20}, (_,i)=>[5,i+2,'W']).concat([[6,1,'W'],[6,22,'W']]),
  cane: [[18,21,'G'],[18,22,'G'],[19,22,'F'],[20,22,'F'],[21,22,'F'],[22,22,'F'],[23,22,'F'],
         [24,22,'F'],[25,22,'F'],[26,22,'F'],[27,22,'F'],[28,22,'F'],[29,22,'F'],[22,21,'S']],
  beard: [[13,9,'H'],[13,10,'H'],[13,11,'H'],[13,12,'H'],[13,13,'H'],[13,14,'H'],
          [14,8,'H'],[14,9,'H'],[14,10,'H'],[14,11,'H'],[14,12,'H'],[14,13,'H'],[14,14,'H'],[14,15,'H'],
          [15,9,'H'],[15,10,'H'],[15,11,'H'],[15,12,'H'],[15,13,'H'],[15,14,'H']],
};

function buildRows({hair='short', eyes='normal', outfit='kimono', age='adult'}) {
  const hc = HAIRS[hair];
  const head = [...hc.top, ...faceRows(eyes)];
  // サイドの髪：r8以降の col1（bobはcol2も）を H に
  for (let r = 8; r <= Math.min(hc.side, 14); r++) {
    if (head[r][1] === 'K' || head[r][1] === 'S') {
      head[r] = head[r][0] + 'H' + head[r].slice(2);
    } else if (head[r][0] === '.') {
      head[r] = '.H' + head[r].slice(2);
    }
    if (hc.wide && r <= 11) head[r] = head[r].slice(0, 2) + 'H' + head[r].slice(3);
  }
  const body = age === 'child' ? CHILD_BODY : OUTFIT_FORMS[outfit];
  return [...head, ...body].map(mirror);
}

function drawSprite(rows, pal, patches, scale) {
  const h = rows.length, w = rows[0].length;
  const cv = document.createElement('canvas');
  cv.width = w * scale; cv.height = h * scale;
  const ctx = cv.getContext('2d');
  const grid = rows.map(r => r.split(''));
  for (const [r, c, k] of patches) if (grid[r] && grid[r][c] !== undefined) grid[r][c] = k;
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
    const k = grid[y][x];
    if (k === '.') continue;
    ctx.fillStyle = pal[k] ?? '#f0f';
    ctx.fillRect(x * scale, y * scale, scale, scale);
  }
  return cv;
}

function make(opts) {
  const pal = { ...PAL, H: HAIR_COLORS[opts.hairColor ?? 'black'], ...TIERS[opts.tier ?? '標準'] };
  let patches = [...FACE_PATCH[opts.eyes ?? 'normal'], ...(HAIRS[opts.hair ?? 'short'].post ?? [])];
  if (opts.age === 'elder') { pal.H = HAIR_COLORS.white; patches = patches.concat(ACCESSORIES.beard); }
  for (const a of opts.acc ?? []) patches = patches.concat(ACCESSORIES[a]);
  return drawSprite(buildRows(opts), pal, patches, opts.scale ?? 4);
}

function show(title, items) {
  const out = document.getElementById('out');
  const h = document.createElement('h2'); h.textContent = title; out.appendChild(h);
  const row = document.createElement('div'); row.className = 'row'; out.appendChild(row);
  for (const it of items) {
    const cell = document.createElement('div'); cell.className = 'cell';
    cell.appendChild(it.cv);
    const sp = document.createElement('span'); sp.textContent = it.label; cell.appendChild(sp);
    row.appendChild(cell);
  }
}

// ── 表示 ──────────────────────────────────────────
show('髪型 9種（標準着物）', [
  { cv: make({hair:'short'}), label: '短髪' },
  { cv: make({hair:'spiky', hairColor:'brown'}), label: 'つんつん' },
  { cv: make({hair:'bob', hairColor:'chestnut'}), label: 'おかっぱ' },
  { cv: make({hair:'long'}), label: '長髪' },
  { cv: make({hair:'ponytail', hairColor:'brown'}), label: 'ポニーテール' },
  { cv: make({hair:'twintail', hairColor:'chestnut'}), label: 'ツインテール' },
  { cv: make({hair:'bun', hairColor:'gray'}), label: 'お団子' },
  { cv: make({hair:'mage'}), label: 'まげ' },
  { cv: make({hair:'bald'}), label: 'まるぼうず' },
]);
show('服装 6形状 × 財産3段階の色', [
  { cv: make({outfit:'samue', tier:'質素'}), label: '野良着（質素）' },
  { cv: make({outfit:'kimono', tier:'標準'}), label: '着物' },
  { cv: make({outfit:'shima', tier:'標準'}), label: '縞の着物' },
  { cv: make({outfit:'shirt', tier:'標準'}), label: '洋装' },
  { cv: make({outfit:'haori', tier:'立派'}), label: '羽織' },
  { cv: make({outfit:'montsuki', tier:'立派'}), label: '紋付（豪華）' },
]);
show('人生ステージ', [
  { cv: make({age:'child', tier:'質素'}), label: '幼少期(24×24)' },
  { cv: make({hair:'short'}), label: '青年〜壮年' },
  { cv: make({hair:'short', age:'elder', acc:['cane']}), label: '老年期' },
]);
show('表情（活力3段階）', [
  { cv: make({eyes:'normal'}), label: 'ふつう' },
  { cv: make({eyes:'happy'}), label: 'いきいき' },
  { cv: make({eyes:'sad'}), label: 'しょんぼり' },
]);
show('アクセサリ（イベント・家宝由来）', [
  { cv: make({hair:'long', acc:['kanzashi']}), label: 'かんざし' },
  { cv: make({hair:'twintail', hairColor:'chestnut', acc:['ribbon']}), label: 'リボン' },
  { cv: make({hair:'spiky', acc:['hachimaki']}), label: 'はちまき' },
]);
show('表示スケール比較', [
  { cv: make({scale:3}), label: '×3 (72×96)' },
  { cv: make({scale:4}), label: '×4' },
  { cv: make({scale:6}), label: '×6' },
]);
</script>
</body>
</html>
